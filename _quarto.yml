project:
  type: book

bibliography: references.bib
csl: ieee-with-url.csl
link-citations: true

book:
  title: "Bitcoin і BTC: економічний та статистичний аналіз"
  chapters:
    - index.qmd
    - 01-how-it-works.qmd
    - 02-data-acquisition.qmd
    - 03-price-and-returns.qmd
    - references.qmd
  repo-url: https://github.com/RomanKuznietsovByBuffMedic/bitcoin-economic-statistical-analysis
  repo-actions: [source]

lang: uk
from: markdown-smart

number-sections: true
number-depth: 6
toc-depth: 6

execute:
  echo: true
  fig-width: 12
  fig-height: 8
  fig-dpi: 144
  warning: false
  message: false

format:
  html:
    theme:
      dark: darkly
      light: cosmo
    respect-user-color-scheme: false
    css: assets/book-figures.css
    include-in-header: assets/dark-reader-lock.html
    toc: true
    toc-title: "Зміст"
    toc-location: right
    toc-expand: true
    smooth-scroll: true
    code-fold: show
    code-summary: "Показати / приховати код"
    code-copy: false
    code-line-numbers: true
    code-overflow: wrap
    code-tools:
      source: false
      toggle: true
      caption: "Код"
